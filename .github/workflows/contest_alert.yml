name: 🏆 Contest Alert Bot

on:
  schedule:
    # Runs every 30 minutes (safe for free tier)
    - cron: "*/30 * * * *"

  # Manual trigger (for testing)
  workflow_dispatch:

jobs:
  check-contests:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install dependencies
        run: pip install requests

      - name: 🔍 Run contest alert script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python contest_alert.py

      # ✅ Persist sent.json (VERY IMPORTANT)
      - name: 💾 Save sent state
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add sent.json || true
          git commit -m "update sent contests" || true
          git push || true
